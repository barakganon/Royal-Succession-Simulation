{% extends "base.html" %}
{% block title %}World Map{% endblock %}

{% block content %}
<div class="container-fluid">
  <h2 class="mt-3 mb-2">World Map</h2>
  <div class="row">
    <!-- Map canvas -->
    <div class="col-md-9">
      <div style="position:relative;border:1px solid #444;border-radius:4px;background:#1a2a3a;">
        <canvas id="worldMap" width="900" height="600" style="display:block;cursor:pointer;"></canvas>
      </div>
      <small class="text-muted">Click a territory for details. Colours = dynasty ownership.</small>
    </div>
    <!-- Sidebar -->
    <div class="col-md-3">
      <div class="card" id="territory-info">
        <div class="card-header"><strong>Territory Details</strong></div>
        <div class="card-body" id="territory-detail">
          <p class="text-muted">Click a territory on the map.</p>
        </div>
      </div>
      <div class="card mt-3">
        <div class="card-header"><strong>Legend</strong></div>
        <div class="card-body" id="map-legend" style="font-size:0.85em;"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var canvas = document.getElementById('worldMap');
  var ctx = canvas.getContext('2d');
  var features = [];
  var selectedId = null;

  // Dynasty ID → deterministic hue
  function dynastyHue(id) {
    if (!id) return 220; // grey-blue for unowned
    return (id * 137.508) % 360;
  }

  function dynastyColor(id, alpha) {
    alpha = alpha || 1;
    if (!id) return 'rgba(80,100,120,' + alpha + ')';
    var h = dynastyHue(id);
    return 'hsla(' + h + ',55%,45%,' + alpha + ')';
  }

  function drawMap() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#1a2a3a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    features.forEach(function(f) {
      if (!f.geometry || !f.geometry.coordinates) return;
      var coords = f.geometry.coordinates[0];
      var p = f.properties;
      var isSelected = (p.territory_id === selectedId);

      ctx.beginPath();
      coords.forEach(function(pt, i) {
        if (i === 0) ctx.moveTo(pt[0], pt[1]);
        else ctx.lineTo(pt[0], pt[1]);
      });
      ctx.closePath();

      ctx.fillStyle = dynastyColor(p.owner_dynasty_id, isSelected ? 1 : 0.75);
      ctx.fill();
      ctx.strokeStyle = isSelected ? '#FFD700' : '#2a3a4a';
      ctx.lineWidth = isSelected ? 2 : 0.5;
      ctx.stroke();

      // Army token
      if (p.army_count > 0 && p.centroid) {
        ctx.beginPath();
        ctx.arc(p.centroid[0], p.centroid[1], 5, 0, Math.PI * 2);
        ctx.fillStyle = '#FFD700';
        ctx.fill();
      }

      // Territory name (small)
      if (p.centroid && p.name) {
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.name.substring(0, 12), p.centroid[0], p.centroid[1] + 3);
      }
    });
  }

  function buildLegend() {
    var seen = {};
    var html = '';
    features.forEach(function(f) {
      var p = f.properties;
      var key = p.owner_dynasty_id || 0;
      if (!seen[key]) {
        seen[key] = true;
        var name = p.owner_dynasty_name || 'Unclaimed';
        var color = dynastyColor(p.owner_dynasty_id, 1);
        html += '<div class="d-flex align-items-center mb-1">' +
          '<div style="width:16px;height:16px;background:' + color + ';border-radius:3px;margin-right:8px;flex-shrink:0;"></div>' +
          '<small>' + name + '</small></div>';
      }
    });
    document.getElementById('map-legend').innerHTML = html || '<small class="text-muted">No dynasties</small>';
  }

  function showDetail(props) {
    var html = '<dl class="mb-0">';
    html += '<dt>' + (props.name || 'Unknown') + '</dt>';
    html += '<dd><small>Owner: ' + (props.owner_dynasty_name || 'Unclaimed') + '</small></dd>';
    html += '<dd><small>Terrain: ' + (props.terrain_type || '&mdash;') + '</small></dd>';
    html += '<dd><small>Population: ' + (props.population || 0) + '</small></dd>';
    if (props.army_count > 0) html += '<dd><small>&#x2694; Armies: ' + props.army_count + '</small></dd>';
    if (props.is_capital) html += '<dd><small>&#x2605; Capital</small></dd>';
    html += '</dl>';
    document.getElementById('territory-detail').innerHTML = html;
  }

  // Hit detection: point-in-polygon (ray casting)
  function pointInPolygon(x, y, coords) {
    var inside = false;
    for (var i = 0, j = coords.length - 1; i < coords.length; j = i++) {
      var xi = coords[i][0], yi = coords[i][1];
      var xj = coords[j][0], yj = coords[j][1];
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  }

  canvas.addEventListener('click', function(e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var hit = null;
    features.forEach(function(f) {
      if (!f.geometry || !f.geometry.coordinates) return;
      var coords = f.geometry.coordinates[0];
      if (pointInPolygon(x, y, coords)) hit = f;
    });
    if (hit) {
      selectedId = hit.properties.territory_id;
      showDetail(hit.properties);
      drawMap();
    }
  });

  // Load GeoJSON for the current dynasty
  var dynastyId = {{ dynasty_id if dynasty_id else 'null' }};
  var url = dynastyId ? '/game/' + dynastyId + '/map.geojson' : null;

  function loadAndDraw(dataUrl) {
    if (!dataUrl) {
      ctx.fillStyle = '#ccc';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Select a dynasty to view the map', canvas.width / 2, canvas.height / 2);
      return;
    }
    fetch(dataUrl)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        features = data.features || [];
        if (features.length === 0) {
          ctx.fillStyle = '#999';
          ctx.font = '16px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('No territory data available', canvas.width / 2, canvas.height / 2);
          return;
        }

        // Auto-scale: find bounding box and fit to canvas
        var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        features.forEach(function(f) {
          if (!f.geometry) return;
          f.geometry.coordinates[0].forEach(function(pt) {
            minX = Math.min(minX, pt[0]); minY = Math.min(minY, pt[1]);
            maxX = Math.max(maxX, pt[0]); maxY = Math.max(maxY, pt[1]);
          });
        });

        var padding = 40;
        var scaleX = (canvas.width - 2 * padding) / (maxX - minX || 1);
        var scaleY = (canvas.height - 2 * padding) / (maxY - minY || 1);
        var scale = Math.min(scaleX, scaleY);

        // Transform all coordinates in-place
        features.forEach(function(f) {
          if (!f.geometry) return;
          f.geometry.coordinates[0] = f.geometry.coordinates[0].map(function(pt) {
            return [(pt[0] - minX) * scale + padding, (pt[1] - minY) * scale + padding];
          });
          if (f.properties.centroid) {
            f.properties.centroid = [
              (f.properties.centroid[0] - minX) * scale + padding,
              (f.properties.centroid[1] - minY) * scale + padding
            ];
          }
        });

        drawMap();
        buildLegend();
      })
      .catch(function(err) {
        console.error('Map load error:', err);
        ctx.fillStyle = '#c00';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Failed to load map data', canvas.width / 2, canvas.height / 2);
      });
  }

  loadAndDraw(url);
})();
</script>
{% endblock %}
