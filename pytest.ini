[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    functional: Functional tests
    slow: Tests that take a long time to run
    db: Tests that require a database
    web: Tests that require a web server
    api: Tests that test the API
    model: Tests for database models
    game_manager: Tests for the game manager
    simulation: Tests for the simulation engine
    visualization: Tests for visualization components
# SQLAlchemy 2.0 LegacyAPIWarnings (from Model.query.get() / session.query(M).get()
# / Model.query.get_or_404()) were FIXED at the source: replaced with
# db.session.get() and db.get_or_404(). No blanket suppression — if a legacy
# Query.get() reappears, the warning must surface so it gets fixed too.
#
# The ONE remaining suppression is narrowed by message to a warning that is NOT
# fixable in this codebase:
#   - SAWarning "Can't sort tables for DROP": inherent to the intentional
#     circular FK (dynasty <-> person_db, already use_alter=True) on SQLite,
#     which cannot ALTER on DROP. Fires once per table teardown. Message-scoped
#     so any OTHER SAWarning still surfaces.
filterwarnings =
    ignore:Can't sort tables for DROP:sqlalchemy.exc.SAWarning