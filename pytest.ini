[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    functional: Functional tests
    slow: Tests that take a long time to run
    db: Tests that require a database
    web: Tests that require a web server
    api: Tests that test the API
    model: Tests for database models
    game_manager: Tests for the game manager
    simulation: Tests for the simulation engine
    visualization: Tests for visualization components
# Story 11-4: the bulk of warnings were SQLAlchemy 2.0 LegacyAPIWarnings from
# Model.query.get() / session.query(M).get(); those were fixed at the source
# (replaced with session.get()). The remaining suppressions below are for
# warnings that are NOT fixable in this codebase:
#   - SAWarning "Can't sort tables for DROP": inherent to the intentional
#     circular FK (dynasty <-> person_db, already use_alter=True) on SQLite,
#     which cannot ALTER on DROP. Fires once per table teardown. Narrowed by
#     message so any OTHER SAWarning still surfaces.
#   - LegacyAPIWarning: backstop for any stray Query.get() reached only via a
#     library/fixture path (none remain in app code; grep confirms 0).
filterwarnings =
    ignore:Can't sort tables for DROP:sqlalchemy.exc.SAWarning
    ignore::sqlalchemy.exc.LegacyAPIWarning
    ignore::DeprecationWarning:sqlalchemy